[loggers]
keys=root

[handlers]
keys=logfile

[formatters]
keys=logformatter

[logger_root]
level=INFO
handlers=logfile

[handler_logfile]
class=handlers.RotatingFileHandler
formatter=logformatter
args=('./webicker.log', 'a')

[formatter_logformatter]
format=%(asctime)s %(levelname)-8s %(name)-15s %(message)s
datefmt=%Y-%m-%d %H:%M:%S
